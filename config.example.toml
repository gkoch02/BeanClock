[kid]
name = "Lily"
born_at = 2022-09-12T03:47:00-07:00

[schedule]
wake_hour = 7
sleep_hour = 21

[display]
flip = false
accent = "heart"
# "extended" = years/months hero with days/hours subtitle (default).
# "days" or "hours" = single big total count.
# "full" = extended layout plus compact total_days / total_hours in the
#   bottom corners.
format = "extended"
# After sunset (computed from [location] below), invert the black plane so
# the panel reads white-on-black. Red beads/accents stay red. Requires
# [location] to be set; outside the [wake_hour, sleep_hour] window the
# panel still skips entirely. Set to false to keep day-style rendering
# until sleep_hour.
after_hours_invert = true

[location]
# Latitude/longitude in decimal degrees, used by display.after_hours_invert
# to compute today's sunset. Defaults are San Jose, CA — change to your
# actual location. Omit the whole block (and set after_hours_invert =
# false above) to disable the after-hours feature.
latitude = 37.2872
longitude = -121.9500

[special_days]
# Show "Happy Nth Birthday!" on the kid's birthday (Feb 29 falls back to
# Feb 28 in non-leap years).
birthday = true
# Show "N days!" when total_days exactly hits one of these milestones.
# Pick round numbers that feel celebratory; set to [] to disable.
milestones = [100, 500, 1000, 2000, 5000]
