[kid]
name = "Lily"
born_at = 2022-09-12T03:47:00-07:00

[schedule]
wake_hour = 7
sleep_hour = 21

[display]
flip = false
accent = "heart"
# "extended" = years/months hero with days/hours subtitle (default).
# "days" or "hours" = single big total count.
format = "extended"

[special_days]
# Show "Happy Nth Birthday!" on the kid's birthday (Feb 29 falls back to
# Feb 28 in non-leap years).
birthday = true
# Show "N days!" when total_days exactly hits one of these milestones.
# Pick round numbers that feel celebratory; set to [] to disable.
milestones = [100, 500, 1000, 2000, 5000]
